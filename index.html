<script>
function partilharEquipas(){
  if(!partida.equipaA || partida.equipaA.length===0){
    alert('Sorteia as equipas primeiro.');
    return;
  }

  const eqA = partida.equipaA;
  const eqB = partida.equipaB;

  const linhasA = eqA.length, linhasB = eqB.length;
  const altTotal = 80 + 40 + 40 + (linhasA * 36) + 20 + 40 + (linhasB * 36) + 40;
  const canvas = document.getElementById('share-canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = 600;
  canvas.height = altTotal;

  ctx.clearRect(0, 0, 600, altTotal);
  ctx.fillStyle = '#0d1f15';
  ctx.fillRect(0, 0, 600, altTotal);

  ctx.fillStyle = '#142a1c';
  ctx.beginPath();
  ctx.roundRect(20, 20, 560, altTotal - 40, 16);
  ctx.fill();

  // Título
  ctx.fillStyle = '#25a865';
  ctx.font = 'bold 22px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('Fut5 — Equipas de hoje', 300, 58);

  const d = jogoAtual.data
    ? new Date(jogoAtual.data + 'T12:00:00').toLocaleDateString('pt-PT', {
        weekday: 'long',
        day: 'numeric',
        month: 'long'
      })
    : '';

  ctx.fillStyle = '#8ab89a';
  ctx.font = '12px system-ui';
  ctx.fillText(d, 300, 78);

  // Linha
  ctx.strokeStyle = '#2a4a35';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(40, 90);
  ctx.lineTo(560, 90);
  ctx.stroke();

  // Equipa A
  let y = 115;
  ctx.fillStyle = '#3080d0';
  ctx.font = 'bold 14px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('● EQUIPA A', 40, y);

  y += 14;
  eqA.forEach(j => {
    y += 8;
    ctx.fillStyle = '#102040';
    ctx.beginPath();
    ctx.roundRect(40, y, 520, 28, 7);
    ctx.fill();

    ctx.fillStyle = '#e8f5ed';
    ctx.font = '13px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(j.nome, 56, y + 19);

    y += 28;
  });

  y += 16;
  ctx.strokeStyle = '#2a4a35';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(40, y);
  ctx.lineTo(560, y);
  ctx.stroke();

  // Equipa B
  y += 20;
  ctx.fillStyle = '#f07020';
  ctx.font = 'bold 14px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('● EQUIPA B', 40, y);

  y += 14;
  eqB.forEach(j => {
    y += 8;
    ctx.fillStyle = '#3a1a00';
    ctx.beginPath();
    ctx.roundRect(40, y, 520, 28, 7);
    ctx.fill();

    ctx.fillStyle = '#e8f5ed';
    ctx.font = '13px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(j.nome, 56, y + 19);

    y += 28;
  });

  y += 20;
  ctx.fillStyle = '#2a4a35';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('Fut5 Manager', 300, y + 10);

  const img = canvas.toDataURL('image/png');
  document.getElementById('share-preview').innerHTML =
    `<img src="${img}" style="width:100%;border-radius:10px">`;

  document.getElementById('modal-share').classList.add('open');
}
</script>
